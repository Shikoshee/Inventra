<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Users</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; margin: 20px; }
    h1, h2 { text-align: center; color: #007BFF; }

    .container {
      max-width: 600px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .form-group { margin: 15px 0; }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 15px;
      background: #007BFF;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }
    .btn:hover { background: #0056b3; }

    .error { color: red; font-size: 0.9em; text-align: center; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }
    th {
      background: #007BFF;
      color: white;
    }

    .btn-delete {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-delete:hover { background: #b52b37; }

    .btn-back {
      display: block;
      width: 200px;
      margin: 30px auto;
      text-align: center;
      background: #007BFF;
      color: #fff;
      padding: 10px;
      text-decoration: none;
      border-radius: 5px;
    }
    .btn-back:hover { background: #0056b3; }

    .dashboard-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  background: #007BFF;
  color: #fff;
  padding: 10px 18px;
  border-radius: 5px;
  font-weight: bold;
  text-decoration: none;
  transition: background 0.3s;
}
.dashboard-btn:hover {
  background: #0056b3;
}
  </style>
</head>
<body>
  <a href="#" class="dashboard-btn" onclick="openAdminDashboard(event)">🏠 Dashboard</a>

  <h1>Manage Users</h1>

  <div class="container">
    <h2>Create New User</h2>
    <form id="addUserForm" onsubmit="return validateForm(event)">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" required>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" required>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" required>
        <small id="errorMsg" class="error"></small>
      </div>

      <div class="form-group">
        <label for="role">Role:</label>
        <select id="role" required>
          <option value="User">User</option>
          <option value="Admin">Admin</option>
        </select>
      </div>

      <button type="submit" class="btn">Create User</button>
    </form>
  </div>

  <div class="container">
    <h2>All Users</h2>
    <table id="userTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Username</th>
          <th>Role</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <a href="admin_dashboard.html" class="btn-back">⬅ Back to Dashboard</a>

  <script>
  // Load users from localStorage
  function getUsers() {
    const users = JSON.parse(localStorage.getItem("users")) || [];
    return users;
  }

  // Save users to localStorage
  function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
  }

  // Display users in table
  function fetchUsers() {
    const users = getUsers();
    const tbody = document.querySelector("#userTable tbody");
    tbody.innerHTML = "";

    if (users.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4">No users found.</td></tr>`;
      return;
    }

    users.forEach((user, index) => {
      tbody.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>${user.username}</td>
          <td>${user.role}</td>
          <td>
            <button class="btn-delete" onclick="deleteUser(${index})">Delete</button>
          </td>
        </tr>
      `;
    });
  }

  // Validate and add user
  function validateForm(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;
    const role = document.getElementById("role").value;
    const errorMsg = document.getElementById("errorMsg");

    if (password.length < 6) {
      errorMsg.textContent = "Password must be at least 6 characters long.";
      return false;
    }
    if (password !== confirmPassword) {
      errorMsg.textContent = "Passwords do not match!";
      return false;
    }

    errorMsg.textContent = "";

    let users = getUsers();

    // Check if username exists
    if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
      alert("Username already exists!");
      return false;
    }

    users.push({ username, password, role });
    saveUsers(users);
    alert("✅ User created successfully!");
    document.getElementById("addUserForm").reset();
    fetchUsers();
  }

  // Delete user
  function deleteUser(index) {
    if (!confirm("Are you sure you want to delete this user?")) return;
    let users = getUsers();
    users.splice(index, 1);
    saveUsers(users);
    fetchUsers();
  }

  // Initialize display
  fetchUsers();

  function openAdminDashboard(e) {
  e.preventDefault();
  window.location.href = "admin_dashboard.html";
}
  </script>

</body>
</html>
