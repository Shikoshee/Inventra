<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventra - Stock Taking System</title>
  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    /* LOGO ONLY as the background */
    background: url("/mnt/data/78b682fb-ec9f-4389-953d-f347a209329f.ico") center/450px no-repeat;
    background-color: #f2f6fc; /* soft neutral backdrop */
    color: #333;
  }

  header {
    text-align: center;
    padding: 60px 20px 20px;
    color: #0056d6;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  header p {
    font-size: 1.3rem;
    opacity: 0.9;
    font-weight: 500;
  }

  .container {
    max-width: 450px;
    margin: 40px auto;
    background: rgba(255,255,255,0.95);
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.15);
    position: relative;
    z-index: 2;
    animation: fadeIn 0.8s ease;
  }

  .container h2 {
    margin-bottom: 20px;
    color: #0056d6;
    text-align: center;
    font-size: 1.8rem;
    letter-spacing: 0.5px;
  }

  .form-group {
    margin: 15px 0;
    text-align: left;
  }

  label {
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
    color: #222;
  }

  input, select {
    width: 100%;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 10px;
    font-size: 1rem;
    transition: 0.3s border;
  }

  input:focus, select:focus {
    border-color: #007bff;
    box-shadow: 0 0 4px rgba(0,123,255,0.3);
    outline: none;
  }

  .btn {
    display: inline-block;
    margin-top: 25px;
    padding: 14px 25px;
    border: none;
    border-radius: 10px;
    background: #0056d6;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
    box-shadow: 0 5px 15px rgba(0,86,214,0.25);
  }

  .btn:hover {
    background: #0041a8;
    box-shadow: 0 7px 20px rgba(0,86,214,0.35);
  }

  footer {
    text-align: center;
    color: #333;
    margin-top: 40px;
    padding: 20px;
    font-weight: 500;
  }

  /* Smooth fade animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .header-logo {
  width: 120px;       /* adjust size as needed */
  display: block;
  margin: 0 auto 15px auto;
  border-radius: 20px; /* add this line to curve corners */
}

.dashboard-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  background: #007BFF;
  color: #fff;
  padding: 10px 18px;
  border-radius: 5px;
  font-weight: bold;
  text-decoration: none;
  transition: background 0.3s;
}
.dashboard-btn:hover {
  background: #0056b3;
}
  
</style>

</head>
<body>

  <a href="#" class="dashboard-btn" onclick="openAdminDashboard(event)">🏠 Dashboard</a>
  <header>
    <img src="images/Inventra Logo Design.png" class="header-logo" alt="Inventra Logo">

    <p>Manage your products, sales, and inventory with ease.</p>
  </header>

  <!-- Login Section -->
  <div class="container">
    <h2>Login</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" required>
          <option value="Admin">Admin</option>
          <option value="User">User</option>
        </select>
      </div>
      <button class="btn" type="submit">Login</button>
      <p id="errorMsg" style="color:red;text-align:center;font-weight:bold;margin-top:10px;"></p>
    </form>    
    <p style="margin-top:20px; font-size:0.9rem; color:#666;">
      Tip: Enter your <b>Username</b>, <b>Password</b> and select <b>Role</b> to log in.
    </p>
  </div>

  <footer>
    &copy; 2025 Inventra. All Rights Reserved.
  </footer>

  <script>
    // ✅ Create default users if not already stored
    if (!localStorage.getItem("users")) {
      const defaultUsers = [
        { username: "Ruth Wanjiku", password: "123456", role: "Admin" },
        { username: "Ruth Wanjiku", password: "user123", role: "User" }
      ];
      localStorage.setItem("users", JSON.stringify(defaultUsers));
      console.log("✅ Default users created in localStorage.");
    }

    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", function(event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const role = document.getElementById("role").value;
      const errorMsg = document.getElementById("errorMsg");

      const users = JSON.parse(localStorage.getItem("users")) || [];

      // ✅ Check user credentials
      const validUser = users.find(u =>
        u.username.toLowerCase() === username.toLowerCase() &&
        u.password === password &&
        u.role === role
      );

      if (validUser) {
        // Save session in localStorage
        localStorage.setItem("loggedInUser", JSON.stringify({ username, role }));

        alert("✅ Login successful!");

        // Redirect based on role
        if (role === "Admin") {
          window.location.href = "Stock.html";
        } else {
          window.location.href = "user_stock.html";
        }
      } else {
        errorMsg.textContent = "❌ Invalid username, password, or role.";
      }
    });

    function openAdminDashboard(e) {
  e.preventDefault();
  window.location.href = "admin_dashboard.html";
}
  </script>

</body>
</html>
