<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #eef9f4;
    }
    h1 {
      text-align: center;
      color: #28a745;
    }
    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }
    .card {
      background: #fff;
      width: 200px;
      margin: 15px;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      transition: 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    a {
      text-decoration: none;
      color: #28a745;
      font-weight: bold;
    }
    .dashboard-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  background: #007BFF;
  color: #fff;
  padding: 10px 18px;
  border-radius: 5px;
  font-weight: bold;
  text-decoration: none;
  transition: background 0.3s;
}
.dashboard-btn:hover {
  background: #0056b3;
}
  </style>
</head>
<body>
  <a href="#" class="dashboard-btn" onclick="openAdminDashboard(event)">🏠 Dashboard</a>
  <h1>User Dashboard</h1>
  <div class="menu">
    <div class="card"><a href="user_stock.html">📦 View Stock</a></div>
    <div class="card"><a href="sales_report.html">📊 Sales Reports</a></div>
    <div class="card"><a href="debts.html">💰 Debts</a></div>
    <div class="card"><a href="Home Stock.html">🚪 Logout</a></div>
  </div>
  <script>
    function openAdminDashboard(e) {
  e.preventDefault();
  window.location.href = "admin_dashboard.html";
}
  </script>
</body>
</html>
