<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Report</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f4f6f9;
  padding:15px;
  color:#333;
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#007BFF;
}

.section{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.top-actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
}

.btn{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  transition:0.3s;
}

.btn:hover{
  opacity:0.9;
}

.btn-backup{
  background:#28a745;
  color:white;
}

.btn-restore{
  background:#ffc107;
}

.btn-pdf{
  background:#007BFF;
  color:white;
}

.btn-reset{
  background:#dc3545;
  color:white;
}

.btn-pay{
  background:#28a745;
  color:white;
}

.btn-back{
  background:#007BFF;
  color:white;
  width:100%;
  margin-top:10px;
}

.dashboard-btn{
  position:fixed;
  top:15px;
  left:15px;
  background:#007BFF;
  color:white;
  padding:10px 15px;
  border-radius:6px;
  text-decoration:none;
}

.filters{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

input,
select{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

.table-container{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,
td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
  font-size:14px;
}

th{
  background:#007BFF;
  color:white;
}

.status-paid{
  color:green;
  font-weight:bold;
}

.status-unpaid{
  color:red;
  font-weight:bold;
}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:#f8f9fa;
  padding:15px;
  border-radius:8px;
  border-left:5px solid #007BFF;
}

.card h3{
  margin-bottom:10px;
}

.daily-card{
  margin-top:10px;
  padding:10px;
  background:#eef5ff;
  border-radius:6px;
}

.no-data{
  text-align:center;
  padding:30px;
  color:#777;
}

</style>
</head>

<body>

<a href="#" class="dashboard-btn" onclick="openAdminDashboard(event)">
🏠 Dashboard
</a>

<h1>📊 Sales Report</h1>

<!-- ACTION BUTTONS -->
<div class="top-actions">

  <button class="btn btn-backup" onclick="backupData()">
    🧾 Backup
  </button>

  <button class="btn btn-restore"
    onclick="document.getElementById('restoreFile').click()">
    🔁 Restore
  </button>

  <button class="btn btn-pdf" onclick="downloadPDF()">
    📄 Download PDF
  </button>

  <button class="btn btn-reset" onclick="resetSystem()">
    ⚠ Reset System
  </button>

  <input
    type="file"
    id="restoreFile"
    accept=".json"
    hidden
    onchange="restoreData(event)"
  >

</div>

<!-- FILTERS -->
<div class="section">

  <div class="filters">

    <input
      type="text"
      id="searchInput"
      placeholder="Search product/customer..."
    >

    <select id="paymentFilter">
      <option value="">All Payments</option>
      <option value="Cash">Cash</option>
      <option value="Mpesa">Mpesa</option>
      <option value="Card">Card</option>
      <option value="Debt">Debt</option>
    </select>

    <select id="statusFilter">
      <option value="">All Status</option>
      <option value="PAID">PAID</option>
      <option value="PARTIAL">PARTIAL</option>
    </select>

    <input type="date" id="dateFilter">

  </div>

</div>

<!-- SUMMARY -->
<div class="section">

  <div class="summary-grid">

    <div class="card">
      <h3>Total Sales</h3>
      <p id="totalSales">Ksh 0.00</p>
    </div>

    <div class="card">
      <h3>Total Paid</h3>
      <p id="totalPaid">Ksh 0.00</p>
    </div>

    <div class="card">
      <h3>Outstanding Debt</h3>
      <p id="totalDebt">Ksh 0.00</p>
    </div>

    <div class="card">
      <h3>Total Transactions</h3>
      <p id="totalTransactions">0</p>
    </div>

  </div>

</div>

<!-- DAILY SUMMARY -->
<div class="section">

  <h2>📅 Daily Summary</h2>

  <div id="dailySummary"></div>

</div>

<!-- SALES TABLE -->
<div class="section">

  <div class="table-container">

    <table>

      <thead>

        <tr>

          <th>Receipt</th>
          <th>Product</th>
          <th>Customer</th>
          <th>Qty</th>
          <th>Total</th>
          <th>Paid</th>
          <th>Balance</th>
          <th>Payment</th>
          <th>Status</th>
          <th>Date</th>
          <th>Action</th>

        </tr>

      </thead>

      <tbody id="salesTableBody"></tbody>

    </table>

  </div>

</div>

<button class="btn btn-back" onclick="goBack()">
⬅ Back
</button>

<script>

let allSales =
  JSON.parse(localStorage.getItem("allSales")) || [];

allSales.reverse();

function formatMoney(amount){

  return new Intl.NumberFormat('en-KE', {
    style:'currency',
    currency:'KES'
  }).format(amount || 0);

}

function renderSales(data = allSales){

  const tbody =
    document.getElementById("salesTableBody");

  tbody.innerHTML = "";

  if(!data.length){

    tbody.innerHTML = `
      <tr>
        <td colspan="11" class="no-data">
          No sales found.
        </td>
      </tr>
    `;

    return;

  }

  data.forEach((sale,index) => {

    const statusClass =
      sale.status === "PAID"
      ? "status-paid"
      : "status-unpaid";

    tbody.innerHTML += `

      <tr>

        <td>${sale.receiptNo || "-"}</td>

        <td>${sale.product}</td>

        <td>${sale.customer || "-"}</td>

        <td>${sale.qty}</td>

        <td>${formatMoney(sale.total)}</td>

        <td>${formatMoney(sale.amountPaid)}</td>

        <td>${formatMoney(sale.balance)}</td>

        <td>${sale.payment}</td>

        <td class="${statusClass}">
          ${sale.status}
        </td>

        <td>
          ${new Date(sale.date).toLocaleString()}
        </td>

        <td>

          ${
            sale.balance > 0

            ?

            `<button
              class="btn btn-pay"
              onclick="markAsPaid(${index})">
              Mark Paid
            </button>`

            :

            "-"

          }

        </td>

      </tr>

    `;

  });

}

function updateSummary(data = allSales){

  let totalSales = 0;
  let totalPaid = 0;
  let totalDebt = 0;

  const daily = {};

  data.forEach(sale => {

    totalSales += parseFloat(sale.total) || 0;

    totalPaid += parseFloat(sale.amountPaid) || 0;

    totalDebt += parseFloat(sale.balance) || 0;

    const day =
      new Date(sale.date)
      .toISOString()
      .split("T")[0];

    if(!daily[day]){

      daily[day] = {
        sales:0,
        paid:0,
        debt:0
      };

    }

    daily[day].sales += parseFloat(sale.total) || 0;

    daily[day].paid += parseFloat(sale.amountPaid) || 0;

    daily[day].debt += parseFloat(sale.balance) || 0;

  });

  document.getElementById("totalSales")
  .innerText = formatMoney(totalSales);

  document.getElementById("totalPaid")
  .innerText = formatMoney(totalPaid);

  document.getElementById("totalDebt")
  .innerText = formatMoney(totalDebt);

  document.getElementById("totalTransactions")
  .innerText = data.length;

  // DAILY SUMMARY

  const dailyContainer =
    document.getElementById("dailySummary");

  dailyContainer.innerHTML = "";

  Object.keys(daily)
  .sort((a,b) => new Date(b)-new Date(a))
  .forEach(day => {

    dailyContainer.innerHTML += `

      <div class="daily-card">

        <strong>${day}</strong>

        <p>
          Sales:
          ${formatMoney(daily[day].sales)}
        </p>

        <p>
          Paid:
          ${formatMoney(daily[day].paid)}
        </p>

        <p>
          Debt:
          ${formatMoney(daily[day].debt)}
        </p>

      </div>

    `;

  });

}

function filterSales(){

  const search =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

  const payment =
    document.getElementById("paymentFilter")
    .value;

  const status =
    document.getElementById("statusFilter")
    .value;

  const date =
    document.getElementById("dateFilter")
    .value;

  const filtered = allSales.filter(sale => {

    const matchesSearch =

      sale.product?.toLowerCase().includes(search)

      ||

      sale.customer?.toLowerCase().includes(search);

    const matchesPayment =
      !payment || sale.payment === payment;

    const matchesStatus =
      !status || sale.status === status;

    const matchesDate =
      !date ||
      new Date(sale.date)
      .toISOString()
      .split("T")[0] === date;

    return (
      matchesSearch &&
      matchesPayment &&
      matchesStatus &&
      matchesDate
    );

  });

  renderSales(filtered);

  updateSummary(filtered);

}

document.getElementById("searchInput")
.addEventListener("input", filterSales);

document.getElementById("paymentFilter")
.addEventListener("change", filterSales);

document.getElementById("statusFilter")
.addEventListener("change", filterSales);

document.getElementById("dateFilter")
.addEventListener("change", filterSales);

function markAsPaid(index){

  if(!confirm("Mark this debt as paid?")) return;

  allSales[index].status = "PAID";

  allSales[index].amountPaid =
    (parseFloat(allSales[index].amountPaid) || 0)
    +
    (parseFloat(allSales[index].balance) || 0);

  allSales[index].balance = 0;

  localStorage.setItem(
    "allSales",
    JSON.stringify(allSales)
  );

  renderSales();

  updateSummary();

  alert("✅ Debt cleared successfully!");

}

function downloadPDF(){

  const element = document.body;

  const opt = {

    margin:0.5,

    filename:
      `Sales_Report_${
        new Date()
        .toISOString()
        .split("T")[0]
      }.pdf`,

    image:{
      type:'jpeg',
      quality:0.98
    },

    html2canvas:{
      scale:2
    },

    jsPDF:{
      unit:'in',
      format:'letter',
      orientation:'landscape'
    }

  };

  html2pdf()
  .set(opt)
  .from(element)
  .save();

}

function backupData(){

  const blob = new Blob(
    [JSON.stringify(allSales)],
    {type:"application/json"}
  );

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);

  a.download =
    `sales_backup_${
      new Date()
      .toISOString()
      .split("T")[0]
    }.json`;

  a.click();

}

function restoreData(event){

  const file = event.target.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = e => {

    try{

      const restored =
        JSON.parse(e.target.result);

      if(Array.isArray(restored)){

        localStorage.setItem(
          "allSales",
          JSON.stringify(restored)
        );

        allSales = restored.reverse();

        renderSales();

        updateSummary();

        alert("✅ Restored successfully!");

      }

    } catch {

      alert("❌ Invalid backup file.");

    }

  };

  reader.readAsText(file);

}

function resetSystem(){

  const confirmReset =
    confirm("Delete ALL system data?");

  if(!confirmReset) return;

  const finalConfirm =
    prompt("Type DELETE to continue:");

  if(finalConfirm !== "DELETE"){

    alert("Reset cancelled.");

    return;

  }

  localStorage.removeItem("products");

  localStorage.removeItem("allSales");

  localStorage.removeItem("sellIndices");

  alert("✅ System reset successful!");

  window.location.href = "Home Stock.html";

}

function goBack(){

  const user =
    JSON.parse(localStorage.getItem("loggedInUser"));

  if(user?.role === "Admin"){

    window.location.href = "Stock.html";

  } else {

    window.location.href = "user_stock.html";

  }

}

function openAdminDashboard(e){

  e.preventDefault();

  window.location.href =
    "admin_dashboard.html";

}

renderSales();

updateSummary();

</script>

</body>
</html>
