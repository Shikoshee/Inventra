<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create User (Admin Only) - Inventra</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #f9f9f9; 
      margin: 20px; 
    }
    .container { 
      max-width: 400px; 
      margin: auto; 
      background: #fff; 
      padding: 20px;
      border-radius: 8px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); 
    }
    h2 { 
      text-align: center; 
      color: #007BFF; 
    }
    .form-group { 
      margin: 15px 0; 
    }
    label { 
      font-weight: bold; 
      display: block; 
      margin-bottom: 5px; 
    }
    input, select { 
      width: 100%; 
      padding: 10px; 
      border-radius: 5px; 
      border: 1px solid #ccc; 
    }
    .btn { 
      margin-top: 20px; 
      padding: 10px 15px; 
      background: #007BFF; 
      color: #fff; 
      border: none;
      border-radius: 5px; 
      cursor: pointer; 
      width: 100%; 
    }
    .btn:hover { 
      background: #0056b3; 
    }
    .msg { 
      margin-top: 15px; 
      text-align: center; 
      font-weight: bold; 
      color: #333; 
    }
    .error { 
      color: red; 
      font-size: 0.9em; 
    }
     /* ✅ User table styling */
    .user-list {
      max-width: 700px;
      margin: 30px auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: #007BFF;
      color: #fff;
    }
    .action-btn {
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: #fff;
    }
    .edit-btn {
      background: #28a745;
    }
    .delete-btn {
      background: #dc3545;
    }
    .dashboard-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  background: #007BFF;
  color: #fff;
  padding: 10px 18px;
  border-radius: 5px;
  font-weight: bold;
  text-decoration: none;
  transition: background 0.3s;
}
.dashboard-btn:hover {
  background: #0056b3;
}
  </style>
</head>
<body>
  <a href="#" class="dashboard-btn" onclick="openAdminDashboard(event)">🏠 Dashboard</a>
<div class="container">
  <h2>Create New User</h2>

  <!-- Message display -->
  <div class="msg" id="msg"></div>

  <form id="createUserForm" onsubmit="return createUser(event)">
    <div class="form-group">
      <label for="username">Username:</label>
      <input type="text" id="username" required>
    </div>

    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" id="password" required>
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirm Password:</label>
      <input type="password" id="confirm_password" required>
      <small id="errorMsg" class="error"></small>
    </div>

    <div class="form-group">
      <label for="role">Role:</label>
      <select id="role" required>
        <option value="User">User</option>
        <option value="Admin">Admin</option>
      </select>
    </div>

    <button type="submit" class="btn">Create User</button>
  </form>
</div>

<!-- ✅ List of created users -->
<div class="user-list">
  <h2>Existing Users</h2>
  <table id="userTable">
    <thead>
      <tr>
        <th>Username</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="userTableBody"></tbody>
  </table>
</div>


<script>
  // ✅ Ensure only admins can access this page
  const currentUser = JSON.parse(localStorage.getItem('loggedInUser'));
if (!currentUser || User.role !== 'Admin') {
  alert('❌ Unauthorized access! Only Admins can create users.');
  window.location.href = 'Home Stock.html';
}
// ✅ Function to render user list
  // ✅ Render user list
  function renderUsers() {
    const users = JSON.parse(localStorage.getItem('users')) || [];
    const tableBody = document.getElementById('userTableBody');
    tableBody.innerHTML = '';

    users.forEach((user, index) => {
      const row = `
        <tr>
          <td>${user.username}</td>
          <td>${user.role}</td>
          <td>
            <button class="action-btn edit-btn" onclick="editUser(${index})">Edit</button>
            <button class="action-btn delete-btn" onclick="deleteUser(${index})">Delete</button>
          </td>
        </tr>`;
      tableBody.innerHTML += row;
    });
  }

  // ✅ Create user in localStorage
  function createUser(event) {
    event.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    const role = document.getElementById('role').value;
    const msg = document.getElementById('msg');
    const errorMsg = document.getElementById('errorMsg');

    if (password.length < 6) {
      errorMsg.textContent = 'Password must be at least 6 characters long.';
      return false;
    }
    if (password !== confirmPass) {
      errorMsg.textContent = 'Passwords do not match!';
      return false;
    }
    errorMsg.textContent = '';

    let users = JSON.parse(localStorage.getItem('users')) || [];

    if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
      msg.style.color = 'red';
      msg.textContent = '⚠️ Username already exists!';
      return false;
    }

    const newUser = {
      id: Date.now(),
      username,
      password,
      role
    };
    users.push(newUser);
    localStorage.setItem('users', JSON.stringify(users));

    msg.style.color = 'green';
    msg.textContent = '✅ User created successfully!';

    document.getElementById('createUserForm').reset();

    // ✅ Refresh user list instantly
    renderUsers();

    return false;
  }

  // ✅ Edit user
  function editUser(index) {
    const users = JSON.parse(localStorage.getItem('users')) || [];
    const user = users[index];
    const newUsername = prompt('Edit username:', user.username);
    const newPassword = prompt('Edit password:', user.password);
    const newRole = prompt('Edit role (Admin/User):', user.role);

    if (newUsername && newPassword && newRole) {
      users[index].username = newUsername;
      users[index].password = newPassword;
      users[index].role = newRole;
      localStorage.setItem('users', JSON.stringify(users));
      renderUsers();
      alert('✅ User updated successfully!');
    }
  }

  // ✅ Delete user
  function deleteUser(index) {
    if (confirm('Are you sure you want to delete this user?')) {
      let users = JSON.parse(localStorage.getItem('users')) || [];
      users.splice(index, 1);
      localStorage.setItem('users', JSON.stringify(users));
      renderUsers();
    }
  }

  // ✅ Load users when page loads
  renderUsers();
  function openAdminDashboard(e) {
  e.preventDefault();
  window.location.href = "admin_dashboard.html";
}
</script>
</body>
</html>
