<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Debts Report</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    h1 { text-align: center; color: #dc3545; }
    table {
      width: 100%; border-collapse: collapse; margin-top: 20px;
    }
    table, th, td {
      border: 1px solid #ccc; text-align: center; padding: 8px;
    }
    th { background: #dc3545; color: white; }
    button {
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-pay {
      background: #28a745;
      color: #fff;
    }
    .btn-pay:hover { background: #218838; }
    .btn-back { 
      display: block; width: 200px; margin: 20px auto; 
      padding: 10px; text-align: center;
      background: #007BFF; color: #fff; text-decoration: none; border-radius: 5px;
    }
    .btn-back:hover { background: #0056b3; }
    .totals {
      margin-top: 30px;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .totals h2 {
      color: #dc3545;
      margin-bottom: 10px;
    }
    .totals p {
      font-size: 1.1rem;
      color: #333;
      margin: 5px 0;
    }

    .dashboard-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  background: #007BFF;
  color: #fff;
  padding: 10px 18px;
  border-radius: 5px;
  font-weight: bold;
  text-decoration: none;
  transition: background 0.3s;
}
.dashboard-btn:hover {
  background: #0056b3;
}
  </style>
</head>
<body>
  <a href="#" class="dashboard-btn" onclick="openAdminDashboard(event)">🏠 Dashboard</a>
  <div class="btn-container" style="text-align:center;">
    <button class="btn btn-delete" onclick="resetSystem()">⚠️ Reset System</button>
  </div>

  <h1>Outstanding Debts</h1>
  <div style="text-align:center; margin-top: 15px;">
  <input 
    type="text" 
    id="searchDebtor" 
    placeholder="🔍 Search by debtor name..." 
    style="padding:10px; width:300px; border-radius:5px; border:1px solid #ccc;"
    oninput="renderDebts()"
  >
</div>
  <div id="debtContainer"></div>
  <div class="totals" id="totalsContainer"></div>

  <a href="Stock.html" class="btn-back">⬅ Back to Stock</a>

  <script>
    let allSales = JSON.parse(localStorage.getItem("allSales")) || [];

    if (!allSales.length) {
      document.getElementById("debtContainer").innerHTML = "<p>No debt data available.</p>";
    } else {
      renderDebts();
      updateDebtTotals();
    }

    // Render debts table
    function renderDebts() {

  let searchValue = document.getElementById("searchDebtor")?.value.toLowerCase() || "";

let debts = allSales.filter(s => {
  let hasDebt = (parseFloat(s.balance) || 0) > 0;
  let debtorName = (s.debtor || "").toLowerCase();

  return hasDebt && debtorName.includes(searchValue);
});
  

  if (!debts.length) {
    document.getElementById("debtContainer").innerHTML = "<p>No debts recorded.</p>";
    return;
  }

  let debtHTML = `
    <table>
      <tr>
        <th>Product</th>
        <th>Price Each</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Balance</th>
        <th>Payment</th>
        <th>Debtor Name</th>
        <th>Sale Date</th>
        <th>Status</th>
        <th>Cleared Date</th>
        <th>Action</th>
      </tr>
  `;

  debts.forEach((d, index) => {

    let status = d.status || (d.balance > 0 ? "UNPAID" : "PAID");
    let clearedDate = d.clearedDate || "-";

    debtHTML += `
      <tr>
        <td>${d.product}</td>
        <td>Ksh ${d.price}</td>
        <td>${d.qty}</td>
        <td>Ksh ${d.total}</td>
        <td>Ksh ${d.balance ? d.balance.toFixed(2) : "0.00"}</td>
        <td>${d.payment}</td>
        <td>${d.debtor || "N/A"}</td>
        <td>${d.date}</td>
        <td>${status}</td>
        <td>${clearedDate}</td>
        <td>${
          status === "UNPAID"
            ? `<button class="btn-pay" onclick="markAsPaid(${index})">Mark as PAID</button>`
            : "-"
        }</td>
      </tr>
    `;
  });

  debtHTML += `</table>`;
  document.getElementById("debtContainer").innerHTML = debtHTML;
}

    // Mark a debt as cleared (Local only)
   function markAsPaid(index) {

  if (!confirm("Mark this debt as paid?")) return;

  const now = new Date();
  let searchValue = document.getElementById("searchDebtor")?.value.toLowerCase() || "";

let debts = allSales.filter(s => {
  let hasDebt = (parseFloat(s.balance) || 0) > 0;
  let debtorName = (s.debtor || "").toLowerCase();

  return hasDebt && debtorName.includes(searchValue);
});

  let sale = debts[index];
  if (!sale) return;

  // Find original in allSales
  let originalIndex = allSales.findIndex(s =>
    s.product === sale.product &&
    s.date === sale.date &&
    s.debtor === sale.debtor
  );

  if (originalIndex === -1) return;

  const balancePaid = allSales[originalIndex].balance || 0;

  allSales[originalIndex].status = "PAID";
  allSales[originalIndex].balance = 0;
  allSales[originalIndex].clearedAmount = balancePaid;
  allSales[originalIndex].amountPaid =
    (parseFloat(allSales[originalIndex].amountPaid) || 0) + balancePaid;

  allSales[originalIndex].clearedDate = now.toLocaleString();
  allSales[originalIndex].paidDate = now.toISOString().split("T")[0];

  localStorage.setItem("allSales", JSON.stringify(allSales));

  alert("✅ Debt cleared successfully!");

  renderDebts();
  updateDebtTotals();
}


    // Totals for debts (unpaid & cleared)
    function updateDebtTotals() {

  let totalDebt = 0;
  let totalCleared = 0;

  allSales.forEach(s => {

    const balance = parseFloat(s.balance) || 0;
    const total = parseFloat(s.total) || 0;

    if (balance > 0) {
      totalDebt += balance;
    }

    if (s.status === "PAID" && s.clearedDate) {
      totalCleared += (parseFloat(s.clearedAmount) || 0);
    }

  });

  document.getElementById("totalsContainer").innerHTML = `
    <h2>💰 Debt Summary</h2>
    <p><b>Total Unpaid Debts:</b> Ksh ${totalDebt.toFixed(2)}</p>
    <p><b>Total Cleared Debts:</b> Ksh ${totalCleared.toFixed(2)}</p>
  `;
}
        // ✅ Dynamically change back button destination based on logged-in role
    document.addEventListener("DOMContentLoaded", () => {
      const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
      const backBtn = document.querySelector(".btn-back");

      if (loggedInUser && backBtn) {
        if (loggedInUser.role === "User") {
          backBtn.href = "user_stock.html";
        } else if (loggedInUser.role === "Admin") {
          backBtn.href = "Stock.html";
        }
      }
    });
window.addEventListener("storage", (event) => {
  if (event.key === "allSales") {
    allSales = JSON.parse(localStorage.getItem("allSales")) || [];
    renderDebts();
    updateDebtTotals();
  }
});

function openAdminDashboard(e) {
  e.preventDefault();

  // Get logged in user data
  const userData = JSON.parse(localStorage.getItem("loggedInUser"));

  // Check role and redirect
  if (userData?.role === "User") {

    window.location.href = "user_dashboard.html";

  } else if (userData?.role === "Admin") {

    window.location.href = "admin_dashboard.html";

  } else {

    alert("Session expired. Please login again.");

    window.location.href = "login.html";

  }
}


function resetSystem() {

  const confirmReset = confirm("⚠️ This will delete ALL data (products, sales, records).\nAre you sure?");

  if (!confirmReset) return;

  const finalConfirm = prompt("Type DELETE to confirm full system reset:");

  if (finalConfirm !== "DELETE") {
    alert("❌ Reset cancelled.");
    return;
  }

  // Clear only your system data
  localStorage.removeItem("products");
  localStorage.removeItem("allSales");
  localStorage.removeItem("sellIndices");

  // Optional: clear user session
  localStorage.removeItem("loggedInUser");

  alert("✅ System reset successful!");

  // Reload page
  window.location.href = "Home Stock.html"; // or login page
}
  </script>
</body>
</html>
